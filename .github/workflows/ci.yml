name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  rspec:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: plant_sensor_app_test
          # CI-only: no password in the workflow file; runner connects via mapped localhost.
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      CI: true
      PGHOST: 127.0.0.1
      PGPORT: '5432'
      PGUSER: postgres
      PGDATABASE: plant_sensor_app_test

    steps:
      - uses: actions/checkout@v4

      # Caches ~/.bundle and vendor/bundle; cache key includes Gemfile.lock so new gems install only when the lockfile changes.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Prepare test database
        run: bin/rails db:test:prepare

      - name: Run RSpec
        run: bundle exec rspec
